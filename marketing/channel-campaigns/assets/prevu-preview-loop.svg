    <text x="24" y="78" fill="#AEB6BF" font-family="Inter, Arial, sans-serif" font-size="17">Edits code</text>
    <text x="24" y="104" fill="#AEB6BF" font-family="Inter, Arial, sans-serif" font-size="17">Runs commands</text>
  </g>

  <path d="M352 310H458" stroke="#F5B84B" stroke-width="5" stroke-linecap="round"/>
  <path d="M442 292L464 310L442 328" stroke="#F5B84B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(488 224)">
    <rect width="262" height="172" rx="18" fill="#172018" stroke="#4C6B51"/>
    <text x="24" y="42" fill="#F7F7F2" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Prevu environment</text>
    <text x="24" y="82" fill="#B7C8B9" font-family="Inter, Arial, sans-serif" font-size="17">VM-backed runtime</text>
    <text x="24" y="110" fill="#B7C8B9" font-family="Inter, Arial, sans-serif" font-size="17">SSH, services, logs</text>
    <text x="24" y="138" fill="#B7C8B9" font-family="Inter, Arial, sans-serif" font-size="17">Exposed app ports</text>
