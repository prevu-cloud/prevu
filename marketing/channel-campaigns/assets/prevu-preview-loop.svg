<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" rx="28" fill="#0B0D10"/>
  <rect x="58" y="58" width="1084" height="514" rx="24" fill="#11151A" stroke="#2E343B"/>
  <text x="92" y="128" fill="#F7F7F2" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700">Preview environments for coding agents</text>
  <text x="92" y="168" fill="#AEB6BF" font-family="Inter, Arial, sans-serif" font-size="22">Agent changes become clickable, VM-backed review URLs before production.</text>

  <g transform="translate(92 244)">
