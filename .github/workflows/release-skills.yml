name: release-skills

# Trigger: pushing a tag matching skills-vX.Y.Z. The tag's version must
# match packages/skills/package.json#version, otherwise we fail loudly.
on:
  push:
    tags:
      - "skills-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        working-directory: packages/skills
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#skills-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Publishing @prevu/skills@$PKG_VERSION"

      - name: Verify SKILL.md files exist
        working-directory: packages/skills
        run: |
          for skill in prevu prevu-flows; do
            test -f "skills/$skill/SKILL.md" || { echo "missing $skill/SKILL.md"; exit 1; }
          done

      - name: Publish to npm
        working-directory: packages/skills
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
